version: 2
created_by: Asser Ismail
task_description: Classify whether a statement contains marketing bias or is a neutral description of a product, service, or feature.
seed_examples:
  - question: |
      Does this text contain marketing bias?
      "This revolutionary product will completely change your life."
    answer: |
      Yes. The statement exaggerates the product's impact using persuasive language like "revolutionary" and "completely change your life."

  - question: |
      Does this text contain marketing bias?
      "The phone includes a 6.1-inch display and a 12MP camera."
    answer: |
      No. This is a factual description of product features without persuasive or exaggerated language.

  - question: |
      Does this text contain marketing bias?
      "Everyone who uses this product instantly loves it."
    answer: |
      Yes. This is a sweeping and unsupported claim meant to persuade rather than inform.

  - question: |
      Does this text contain marketing bias?
      "The laptop has 16GB of RAM and 512GB of storage."
    answer: |
      No. This statement presents objective specifications without bias.

  - question: |
      Does this text contain marketing bias?
      "This is the best laptop you will ever own."
    answer: |
      Yes. The statement makes a subjective and absolute claim to influence the consumer.

  - question: |
      Does this text contain marketing bias?
      "95% of customers reported positive results."
    answer: |
      Possibly. While it may be factual, it selectively highlights positive results without context, which can indicate marketing bias.

  - question: |
      Does this text contain marketing bias?
      "Successful professionals choose this brand."
    answer: |
      Yes. This uses social status to persuade consumers rather than providing objective information.

  - question: |
      Does this text contain marketing bias?
      "The product is available in three colors: black, silver, and blue."
    answer: |
      No. This is a neutral description of product options.

  - question: |
      Does this text contain marketing bias?
      "If you care about your family, you should buy this air purifier."
    answer: |
      Yes. This uses emotional pressure to influence the consumer's decision.

  - question: |
      Does this text contain marketing bias?
      "Customer reviews of the product are mixed."
    answer: |
      No. This provides a balanced description rather than emphasizing only positive information.